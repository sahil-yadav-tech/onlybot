name: Deploy chat-backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build Docker Image
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/chat-backend:latest .

      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/chat-backend:latest

      - name: Deploy To EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            echo "========================================="
            echo "🚀 Starting deployment of chat-backend"
            echo "========================================="

            echo "📥 Pulling latest image..."
            docker pull ${{ secrets.DOCKER_USERNAME }}/chat-backend:latest

            echo "🛑 Stopping old container..."
            docker stop chat-backend || true
            docker rm chat-backend || true

            echo "🚀 Running new container..."
            docker run -d \
              --restart unless-stopped \
              --name chat-backend \
              --env-file /home/ubuntu/chat-backend/.env \
              -p 5000:5000 \
              ${{ secrets.DOCKER_USERNAME }}/chat-backend:latest

            echo "🧹 Cleaning up unused images..."
            docker image prune -af || true

            echo "📋 Container status:"
            docker ps

            echo "📝 Recent logs:"
            docker logs chat-backend --tail 50

            echo "========================================="
            echo "✅ Deployment complete!"
            echo "========================================="