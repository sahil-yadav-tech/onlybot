# =============================================================================================================================
name: Deploy Chat Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Checkout source code
      - name: Checkout Code
        uses: actions/checkout@v4

      # Login to Docker Hub
      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      # Build Docker Image
      - name: Build Docker Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/chat-backend:latest .

      # Push image to Docker Hub
      - name: Push Docker Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/chat-backend:latest

      # ⭐ NEW: Copy docker-compose.yml to EC2
      - name: Copy docker-compose.yml to EC2
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/chat-backend"

      # ⭐ CHANGED: Deploy using Docker Compose
      - name: Deploy To EC2
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            # CHANGED: Create folder if it doesn't exist
            mkdir -p /home/ubuntu/chat-backend

            cd /home/ubuntu/chat-backend

            # CHANGED: Pass Docker username to docker-compose.yml
            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}

            echo "Pull latest Docker image..."
            docker compose pull

            echo "Start latest container..."
            docker compose up -d

            echo "Waiting for container..."
            sleep 5

            echo "Running Containers:"
            docker ps

            echo "Container Logs:"
            docker compose logs --tail=50

            echo "Cleaning old images..."
            docker image prune -af || true

      # Verify deployment
      - name: Verify Deployment
        run: |
          echo "🎉 Backend deployment completed successfully!"
