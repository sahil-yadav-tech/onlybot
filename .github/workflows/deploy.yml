name: Deploy Backend

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Docker Login
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Build Image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USERNAME }}/chat-backend:latest .

      - name: Push Image
        run: |
          docker push ${{ secrets.DOCKER_USERNAME }}/chat-backend:latest

      - name: Copy Compose & Nginx
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          source: |
            docker-compose.yml
            nginx/**
          target: /home/ubuntu/chat-backend

      - name: Deploy
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            mkdir -p /home/ubuntu/chat-backend

            cd /home/ubuntu/chat-backend

            export DOCKER_USERNAME=${{ secrets.DOCKER_USERNAME }}

            docker compose down || true

            docker compose pull

            docker compose up -d

            docker image prune -af

            docker compose ps

            docker compose logs --tail=50